# Predictive Improvements - Proactive Issue Detection

# Pattern Degradation Alerts
pattern_alerts:
  - pattern_id: "pattern_001"
    pattern_name: "React Component + TypeScript"
    baseline_success_rate: 95.0
    current_success_rate: 95.0
    threshold_drop: 10.0
    status: "healthy"
    last_checked: "2026-03-14"

# Performance Degradation Alerts  
performance_alerts:
  - metric: "avg_tokens_per_request"
    baseline: 13500
    current: 13500
    threshold_increase_percent: 15
    status: "healthy"
    last_checked: "2026-03-14"

# Coverage Gap Alerts
coverage_gaps:
  - technology: "SwiftUI"
    mentions: 3
    tasks_without_skill: 1
    threshold: 3
    recommended_action: "Add rules/mobile/swiftui.md conventions"
    priority: "medium"
  - technology: "Jetpack Compose"
    mentions: 2
    tasks_without_skill: 1
    threshold: 3
    recommended_action: "Add rules/mobile/jetpack-compose.md conventions"
    priority: "low"

# Proactive Suggestions
suggestions:
  - type: "documentation_drift"
    title: "Script count drifted: project.json had 50 but filesystem has 54"
    severity: "warning"
    suggested_action: "Fixed in P1. Add CI validation to prevent recurrence."
    created: "2026-03-14"
    status: "resolved"
  - type: "execution_failure"
    title: "PHASE FINAL step 2 (increment counters) never executes"
    severity: "critical"
    suggested_action: "Running experiment exp_001 to test ENFORCED visible output mode"
    created: "2026-03-14"
    status: "active"
  # Example:
  # - type: "pattern_degradation"
  #   title: "React pattern success dropped to 82%"
  #   severity: "warning"
  #   suggested_action: "Investigate recent changes, update pattern"
  #   created: "2026-01-16"

# Auto-Trigger Rules
trigger_rules:
  pattern_degradation:
    condition: "success_rate drops >10% from baseline"
    action: "Alert + RCA investigation"
  
  token_spike:
    condition: "avg_tokens increases >15%"
    action: "Find inefficiency + propose optimization"
  
  coverage_gap:
    condition: "3+ tasks with no matching skill"
    action: "Propose new skill creation"
  
  error_rate_spike:
    condition: "Error rate >5% in single day"
    action: "Immediate RCA + alert user"

# Statistics
active_alerts: 1
suggestions_made: 2
suggestions_accepted: 1
last_scan: "2026-03-14"
