<!DOCTYPE html>
<!--
  AUTH LOGIN — BaoSon Custom Design (Golden Standard)
  Source: baoson-platform-core (http://localhost:8000/bsadm/login)

  This file is the CANONICAL DOM REFERENCE for ALL frameworks.
  Non-React frameworks (Vue, Blade, EJS, Razor, PHP) convert FROM this file.

  CSS: Import auth.css for styling (self-contained, no Tailwind/Bootstrap needed).
  For Tailwind projects: use equivalent Tailwind utility classes as shown in comments.
-->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login</title>
    <link rel="stylesheet" href="../auth-css/auth.css">
</head>

<body class="auth-page">

    <!-- === ANIMATED GRADIENT BACKGROUND === -->
    <div class="auth-bg">
        <!-- tw: min-h-[100dvh] w-full flex flex-col items-center justify-center px-8 py-6 md:p-4 animate-gradient bg-gradient-to-br from-sky-700 via-blue-600 to-slate-800 relative overflow-hidden -->

        <!-- Decorative Blur Orbs -->
        <div class="auth-orb-1"></div>
        <!-- tw: absolute top-20 left-20 w-64 h-64 bg-cyan-400/20 rounded-full blur-3xl animate-pulse pointer-events-none -->

        <div class="auth-orb-2"></div>
        <!-- tw: absolute bottom-20 right-20 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl pointer-events-none -->

        <!-- === LANGUAGE SWITCHER === -->
        <!-- tw container: relative w-full flex justify-center mb-4 md:mb-6 z-50 md:absolute md:top-6 md:right-6 md:w-auto md:block -->
        <div class="auth-lang">
            <!-- tw pill: flex gap-1 bg-slate-900/30 backdrop-blur-xl p-1 md:p-1.5 rounded-full border border-white/10 shadow-2xl -->
            <div class="auth-lang-pill">
                <!-- Active state: auth-lang-btn auth-lang-btn--active -->
                <!-- tw active: bg-white text-blue-700 shadow-lg scale-105 -->
                <!-- tw inactive: text-white/60 hover:text-white hover:bg-white/10 -->
                <button type="button" class="auth-lang-btn auth-lang-btn--active" data-locale="en">
                    EN
                    <div class="auth-lang-tooltip">English</div>
                </button>
                <button type="button" class="auth-lang-btn" data-locale="vi">
                    VI
                    <div class="auth-lang-tooltip">Tiếng Việt</div>
                </button>
                <button type="button" class="auth-lang-btn" data-locale="ja">
                    JA
                    <div class="auth-lang-tooltip">日本語</div>
                </button>
                <button type="button" class="auth-lang-btn" data-locale="zh">
                    ZH
                    <div class="auth-lang-tooltip">中文</div>
                </button>
            </div>
        </div>

        <!-- === MAIN CONTENT === -->
        <!-- tw: relative w-full max-w-sm md:max-w-md flex flex-col items-center z-10 transition-all duration-500 -->
        <main class="auth-main">

            <!-- === LOGO === -->
            <!-- tw wrap: mb-4 md:mb-8 transition-transform duration-500 hover:scale-105 -->
            <div class="auth-logo-wrap">
                <a href="/{adminPrefix}/dashboard" aria-label="Bao Son">
                    <!-- tw: h-16 md:h-20 w-auto drop-shadow-2xl filter brightness-110 -->
                    <img src="/images/logo-light.png" alt="Bao Son Logo" class="auth-logo">
                </a>
            </div>

            <!-- === GLASS CARD === -->
            <!-- tw: glass w-full rounded-3xl p-6 md:p-10 shadow-2xl relative transition-all duration-500 -->
            <div class="auth-glass">

                <!-- Title — Gradient text -->
                <!-- tw: text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-slate-700 tracking-tight -->
                <div style="margin-bottom: 24px;">
                    <h2 class="auth-title" data-i18n="auth.welcome">System Login</h2>
                </div>

                <!-- Status message (hidden by default) -->
                <!-- <div class="auth-alert auth-alert--success">Status message here</div> -->

                <!-- === FORM === -->
                <form class="auth-form" method="POST" action="/{adminPrefix}/login">

                    <!-- Email Input -->
                    <div class="auth-input-group">
                        <label class="auth-label" data-i18n="auth.email_label">Account</label>
                        <div class="auth-input-wrap">
                            <!-- Left Icon: User -->
                            <div class="auth-input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                    <circle stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" cx="12"
                                        cy="7" r="4" />
                                </svg>
                            </div>
                            <input type="email" name="email" class="auth-input" placeholder="your-name@gmail.com"
                                required data-i18n-placeholder="auth.email_placeholder">
                            <!-- Right: @ symbol -->
                            <div class="auth-input-action">
                                <div class="auth-at-symbol">@</div>
                            </div>
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <div class="auth-input-group">
                            <label class="auth-label" data-i18n="auth.password_label">Password</label>
                            <div class="auth-input-wrap">
                                <!-- Left Icon: Lock -->
                                <div class="auth-input-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" x="3"
                                            y="11" width="18" height="11" rx="2" ry="2" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                            d="M7 11V7a5 5 0 0 1 10 0v4" />
                                    </svg>
                                </div>
                                <input type="password" name="password" class="auth-input" placeholder="••••••••"
                                    required data-i18n-placeholder="auth.password_placeholder">
                                <!-- Right: Eye toggle -->
                                <div class="auth-input-action">
                                    <button type="button" class="auth-eye-btn" onclick="togglePassword(this)">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                            <circle cx="12" cy="12" r="3" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <!-- Forgot Password -->
                        <div class="auth-forgot-link">
                            <a href="/{adminPrefix}/forgot-password" data-i18n="auth.forgot_password">Forgot
                                password?</a>
                        </div>
                    </div>

                    <!-- Error Alert (hidden by default) -->
                    <!-- <div class="auth-alert auth-alert--error">Invalid email or password</div> -->

                    <!-- Submit Button -->
                    <button type="submit" class="auth-submit">
                        <span data-i18n="auth.sign_in">Sign In</span>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>

                </form>

                <!-- === DIVIDER === -->
                <div class="auth-divider">
                    <div class="auth-divider-line"></div>
                    <div class="auth-divider-text">
                        <span data-i18n="auth.or_continue">Quick Login</span>
                    </div>
                </div>

                <!-- === SOCIAL BUTTONS === -->
                <div class="auth-social-grid">
                    <!-- Google -->
                    <a href="/{adminPrefix}/oauth/google/redirect" class="auth-social-btn" title="Login with Google">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        <span>Google</span>
                    </a>

                    <!-- Facebook -->
                    <a href="/{adminPrefix}/oauth/facebook/redirect" class="auth-social-btn"
                        title="Login with Facebook">
                        <svg viewBox="0 0 24 24" fill="#1877F2">
                            <path
                                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                        </svg>
                        <span>Facebook</span>
                    </a>
                </div>

            </div><!-- /.auth-glass -->

            <!-- === FOOTER === -->
            <!-- tw: mt-4 md:mt-8 text-center text-white/40 text-xs font-medium tracking-wide -->
            <footer class="auth-footer">
                <p>
                    &copy;
                    <script>document.write(new Date().getFullYear())</script>
                    <a href="https://baoson.net" target="_blank" rel="noopener noreferrer">BaoSon Ads</a>.
                    All rights reserved.
                </p>
            </footer>

        </main>
    </div>

    <!-- Password toggle script (vanilla JS — frameworks use their own state) -->
    <script>
        function togglePassword(btn) {
            const input = btn.closest('.auth-input-wrap').querySelector('.auth-input');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            // Swap eye icon
            btn.innerHTML = isPassword
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }
    </script>

</body>

</html>
